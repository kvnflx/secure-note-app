name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go test -race -cover ./...

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-src/package-lock.json
      - run: npm ci
        working-directory: web-src
      - run: npm test
        working-directory: web-src
      - run: npm run build
        working-directory: web-src

  e2e:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-src/package-lock.json
      - run: npm ci
        working-directory: web-src
      - run: npx playwright install --with-deps chromium
        working-directory: web-src
      - name: Build frontend
        run: npm run build
        working-directory: web-src
      - name: Copy frontend assets for embed
        run: |
          mkdir -p cmd/burn/web-assets
          cp -r web/. cmd/burn/web-assets/
      - name: Start backend
        env:
          BURN_REDIS_SOCKET: "localhost:6379"
          BURN_REDIS_NETWORK: "tcp"
          BURN_POW_DIFFICULTY: "4"
          BURN_LISTEN_ADDR: ":8080"
        run: |
          go run ./cmd/burn &
          echo $! > /tmp/burn.pid
          # Wait for server to come up
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/healthz && break
            sleep 1
          done
      - name: Run Playwright tests
        env:
          BASE_URL: http://localhost:8080
        run: npx playwright test
        working-directory: web-src
      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/burn.pid) || true
      - name: Upload playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web-src/playwright-report/
          retention-days: 7
