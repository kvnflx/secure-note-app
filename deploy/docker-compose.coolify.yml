# Coolify-specific compose file for Secure Note.
#
# Differences from deploy/docker-compose.yml:
# - No Caddy: Coolify's built-in traefik handles TLS termination + routing.
# - Redis is reached over TCP on the internal Docker network (stable across
#   user/perms changes). Data is still ephemeral via tmpfs on /data.
#
# Coolify reads this file directly from the repo on every deploy.

services:
  burn:
    image: ghcr.io/kvnflx/burn-note:latest
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_BURN=https://note.backsafe.de
      - BURN_LISTEN_ADDR=:8080
      - BURN_REDIS_SOCKET=redis:6379
      - BURN_REDIS_NETWORK=tcp
      - BURN_POW_DIFFICULTY=18
      - BURN_MAX_CIPHERTEXT_KB=100
    expose:
      - "8080"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - volatile-ttl
      - --protected-mode
      - "no"
    tmpfs:
      - /data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
